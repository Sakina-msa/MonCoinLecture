<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Mon Coin Lecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#1a1410;--ink-soft:#3d322a;--muted:#8a7b6e;--muted-light:#b5a89b;
      --bg:#faf7f2;--bg-warm:#f3ede3;--bg-card:#fff;
      --border:#e8e0d4;--border-warm:#d4c8b8;
      --accent:#c4602a;--accent-light:#fdf0e8;--accent-deep:#9e3e14;
      --gold:#b8933f;
      --font-serif:'Playfair Display',Georgia,serif;
      --font-sans:'Instrument Sans',system-ui,sans-serif;
    }
    html{font-size:15px}
    body{
      background:var(--bg-card);color:var(--ink);
      font-family:var(--font-sans);-webkit-font-smoothing:antialiased;
      min-height:100vh;display:grid;grid-template-columns:1fr 1fr;
    }

    /* ── GAUCHE — formulaire ── */
    .left{
      display:flex;flex-direction:column;justify-content:space-between;
      padding:44px 64px;min-height:100vh;
    }
    .logo-mark{font-family:var(--font-serif);font-size:1.2rem;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
    .logo-mark em{font-style:italic;color:var(--accent)}

    .form-area{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:380px;width:100%}

    .form-title{
      font-family:var(--font-serif);
      font-size:2.4rem;font-weight:700;
      color:var(--ink);letter-spacing:-0.03em;line-height:1.1;
      margin-bottom:8px;
    }
    .form-title em{font-style:italic;font-weight:400;color:var(--accent)}
    .form-sub{font-size:0.85rem;color:var(--muted);margin-bottom:36px}
    .form-sub a{color:var(--accent);text-decoration:none;font-weight:600}

    /* Champs */
    .field{margin-bottom:14px;position:relative}
    .field input{
      width:100%;height:52px;
      padding:0 48px 0 18px;
      border:1.5px solid var(--border);border-radius:99px;
      background:var(--bg);font-family:var(--font-sans);
      font-size:0.88rem;color:var(--ink);outline:none;
      transition:border-color 0.18s,box-shadow 0.18s;
    }
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,96,42,0.1);background:#fff}
    .field input::placeholder{color:var(--muted-light)}
    .field-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--muted-light);cursor:pointer;background:none;border:none;padding:0;display:flex}
    .field-icon svg{width:16px;height:16px}

    .forgot{text-align:right;font-size:0.78rem;color:var(--muted);margin-bottom:22px}
    .forgot a{color:var(--ink-soft);text-decoration:none;font-weight:500}
    .forgot a:hover{color:var(--accent)}

    .btn-main{
      width:100%;height:52px;border:none;border-radius:99px;
      background:var(--ink);color:#fff;
      font-family:var(--font-sans);font-size:0.9rem;font-weight:600;
      cursor:pointer;letter-spacing:0.02em;
      transition:background 0.18s,transform 0.15s,box-shadow 0.18s;
      margin-bottom:22px;
    }
    .btn-main:hover{background:var(--ink-soft);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,20,16,0.2)}

    .divider{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .divider-line{flex:1;height:1px;background:var(--border)}
    .divider-text{font-size:0.72rem;color:var(--muted-light)}

    /* Boutons sociaux */
    .socials{display:flex;gap:10px;margin-bottom:0}
    .btn-social{
      flex:1;height:48px;border:1.5px solid var(--border);border-radius:99px;
      background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      font-family:var(--font-sans);font-size:0.82rem;font-weight:500;color:var(--ink-soft);
      transition:border-color 0.15s,background 0.15s;
    }
    .btn-social:hover{border-color:var(--border-warm);background:var(--bg)}
    .btn-social svg{width:18px;height:18px;flex-shrink:0}

    /* Erreur */
    .error-msg{display:none;background:#fff5f0;border:1.5px solid #f0a080;border-radius:12px;padding:10px 14px;font-size:0.8rem;color:var(--accent);margin-bottom:14px}
    .error-msg.show{display:block}

    .left-footer{font-size:0.75rem;color:var(--muted-light)}

    /* ── DROITE — déco ── */
    .right{
      background:#f0ebe3;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:60px 48px;position:relative;overflow:hidden;
    }

    /* Fond dégradé déco */
    .right::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(196,96,42,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(184,147,63,0.1) 0%, transparent 50%);
      pointer-events:none;
    }

    /* Illustration centrale */
    .deco-center{position:relative;z-index:1;text-align:center;width:100%}

    /* Grande initiale décorative */
    .deco-letter{
      font-family:var(--font-serif);
      font-size:clamp(8rem,16vw,14rem);
      font-weight:700;font-style:italic;
      color:rgba(196,96,42,0.08);
      line-height:1;
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      user-select:none;pointer-events:none;
      white-space:nowrap;
    }

    /* Étagère SVG */
    .deco-shelf{width:100%;max-width:440px;margin:0 auto;position:relative;z-index:2}

    /* Carte flottante style widget */
    .float-card{
      position:absolute;z-index:3;
      background:#fff;border-radius:16px;
      padding:14px 18px;
      box-shadow:0 8px 32px rgba(26,20,16,0.12);
      display:flex;align-items:center;gap:12px;
    }
    .float-card-1{bottom:22%;left:0;transform:rotate(-3deg)}
    .float-card-2{top:18%;right:0;transform:rotate(4deg)}

    .fc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .fc-icon svg{width:18px;height:18px}
    .fc-text{display:flex;flex-direction:column;gap:2px}
    .fc-title{font-size:0.8rem;font-weight:600;color:var(--ink)}
    .fc-sub{font-size:0.68rem;color:var(--muted)}

    /* Barre de progression mini */
    .fc-bar{height:4px;background:#eee;border-radius:99px;overflow:hidden;margin-top:4px;width:80px}
    .fc-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold))}

    /* Dots pagination style */
    .deco-dots{display:flex;gap:6px;justify-content:center;margin-top:24px;position:relative;z-index:2}
    .deco-dot{width:8px;height:8px;border-radius:50%;background:var(--border-warm)}
    .deco-dot.on{width:20px;border-radius:99px;background:var(--accent)}

    /* Texte bas déco */
    .deco-caption{
      margin-top:20px;font-size:0.82rem;color:var(--muted);
      text-align:center;position:relative;z-index:2;
      line-height:1.55;max-width:280px;
    }
    .deco-caption strong{color:var(--ink-soft);font-weight:600}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .left{animation:fadeUp 0.5s ease both}

    @media(max-width:860px){body{grid-template-columns:1fr;grid-template-rows:1fr}.right{display:none}.left{padding:44px 36px}}
  </style>
</head>
<body>

<!-- GAUCHE -->
<div class="left">
  <div class="logo-mark">Mon <em>Coin</em> Lecture</div>

  <div class="form-area">
    <div class="form-title">Bon retour<br>par ici <em>!</em></div>
    <div class="form-sub">Pas encore de compte ? <a href="inscrire.html">S'inscrire</a></div>

    <div class="error-msg" id="errMsg"></div>

    <div class="field">
      <input type="email" id="emailInput" placeholder="Adresse e-mail" autocomplete="email"/>
    </div>
    <div class="field">
      <input type="password" id="pwdInput" placeholder="Mot de passe" autocomplete="current-password"/>
      <button class="field-icon" onclick="togglePwd()" type="button" id="eyeBtn">
        <svg id="eyeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>

    <button class="btn-main" onclick="handleLogin()">Se connecter</button>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">ou continuer avec</span><div class="divider-line"></div></div>

    <div class="socials">
      <button class="btn-social">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn-social">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12.017 24c6.624 0 11.99-5.367 11.99-11.988C24.007 5.367 18.641.001 12.017.001z"/></svg>
        Pinterest
      </button>
    </div>
  </div>

  <div class="left-footer">© 2025 Mon Coin Lecture</div>
</div>

<!-- DROITE -->
<div class="right">
  <div class="deco-letter">L</div>

  <!-- Widget flottant 1 — En cours -->
  <div class="float-card float-card-1">
    <div class="fc-icon" style="background:#fdf0e8">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c4602a" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <div class="fc-text">
      <div class="fc-title">Les Misérables</div>
      <div class="fc-sub">En cours · 62%</div>
      <div class="fc-bar"><div class="fc-bar-fill" style="width:62%"></div></div>
    </div>
  </div>

  <!-- Illustration étagère SVG -->
  <div class="deco-shelf">
    <svg viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
      <!-- Fond mur -->
      <rect width="440" height="260" fill="transparent"/>

      <!-- Livre 1 -->
      <rect x="28" y="30" width="46" height="200" rx="3" fill="#c8503a"/>
      <rect x="28" y="30" width="8" height="200" fill="rgba(0,0,0,0.2)"/>
      <rect x="28" y="30" width="46" height="2" fill="rgba(255,255,255,0.15)"/>
      <rect x="28" y="228" width="46" height="2" fill="rgba(255,255,255,0.1)"/>

      <!-- Livre 2 mince -->
      <rect x="78" y="55" width="16" height="175" rx="2" fill="#d4c8b0"/>
      <rect x="78" y="55" width="5" height="175" fill="rgba(0,0,0,0.12)"/>

      <!-- Livre 3 -->
      <rect x="98" y="18" width="52" height="212" rx="3" fill="#3a7a9a"/>
      <rect x="98" y="18" width="8" height="212" fill="rgba(0,0,0,0.22)"/>
      <rect x="98" y="18" width="52" height="2" fill="rgba(255,255,255,0.15)"/>

      <!-- Livre 4 mince -->
      <rect x="154" y="60" width="14" height="170" rx="2" fill="#2a1a10"/>
      <rect x="154" y="60" width="4" height="170" fill="rgba(255,255,255,0.05)"/>

      <!-- Livre 5 grand -->
      <rect x="172" y="10" width="58" height="220" rx="3" fill="#b8933f"/>
      <rect x="172" y="10" width="9" height="220" fill="rgba(0,0,0,0.2)"/>
      <rect x="172" y="10" width="58" height="2" fill="rgba(255,255,255,0.18)"/>

      <!-- Livre 6 petit -->
      <rect x="234" y="70" width="18" height="160" rx="2" fill="#e8ddd0"/>
      <rect x="234" y="70" width="5" height="160" fill="rgba(0,0,0,0.1)"/>

      <!-- Livre 7 incliné légèrement — pile -->
      <rect x="258" y="150" width="54" height="16" rx="2" fill="#3a6e50" transform="rotate(-2 258 150)"/>
      <rect x="258" y="137" width="54" height="14" rx="2" fill="#c84030" transform="rotate(-2 258 137)"/>
      <rect x="258" y="124" width="54" height="14" rx="2" fill="#4a6b7c" transform="rotate(-2 258 124)"/>

      <!-- Livre 8 -->
      <rect x="320" y="24" width="44" height="206" rx="3" fill="#7a3a9a"/>
      <rect x="320" y="24" width="7" height="206" fill="rgba(0,0,0,0.22)"/>

      <!-- Livre 9 mince -->
      <rect x="368" y="50" width="14" height="180" rx="2" fill="#5c3a14"/>
      <rect x="368" y="50" width="4" height="180" fill="rgba(0,0,0,0.18)"/>

      <!-- Livre 10 -->
      <rect x="386" y="35" width="42" height="195" rx="3" fill="#2a3880"/>
      <rect x="386" y="35" width="7" height="195" fill="rgba(0,0,0,0.2)"/>

      <!-- PLANCHE -->
      <rect x="0" y="230" width="440" height="14" fill="#c8a97a"/>
      <rect x="0" y="230" width="440" height="6" fill="#d4b88a"/>
      <rect x="0" y="230" width="440" height="1" fill="rgba(255,255,255,0.3)"/>
      <rect x="0" y="244" width="440" height="16" fill="url(#shelfShadow)"/>
      <defs>
        <linearGradient id="shelfShadow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(80,40,10,0.3)"/>
          <stop offset="100%" stop-color="rgba(80,40,10,0)"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Widget flottant 2 — Stats -->
  <div class="float-card float-card-2">
    <div class="fc-icon" style="background:#edf7ef">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a9e6a" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <div class="fc-text">
      <div class="fc-title">7 favoris</div>
      <div class="fc-sub">12 livres lus</div>
    </div>
  </div>

  <div class="deco-dots">
    <div class="deco-dot on"></div>
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
  </div>
</div>

<script>
function togglePwd() {
  const i = document.getElementById('pwdInput');
  const ico = document.getElementById('eyeIco');
  const show = i.type === 'password';
  i.type = show ? 'text' : 'password';
  ico.innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pwd   = document.getElementById('pwdInput').value;
  const err   = document.getElementById('errMsg');
  err.classList.remove('show');
  if (!email || !pwd) { err.textContent = 'Merci de remplir tous les champs.'; err.classList.add('show'); return; }
  const users = JSON.parse(localStorage.getItem('mcl_users') || '[]');
  const user  = users.find(u => u.email === email && u.password === pwd);
  if (user || users.length === 0) {
    localStorage.setItem('mcl_session', JSON.stringify({email, name: user?.name || email.split('@')[0]}));
    window.location.href = 'index.html';
  } else {
    err.textContent = 'Email ou mot de passe incorrect.'; err.classList.add('show');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
